<!DOCTYPE html>
<html>
<head>
    <title>AI Frequency Oscillator Simulation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f4f8; }
        .app-container { background-color: #ffffff; border-radius: 20px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15); padding: 40px; text-align: center; width: 320px; }
        .frequency-display { font-size: 4.5em; font-weight: 700; color: #28a745; margin-bottom: 10px; line-height: 1; }
        .unit { font-size: 0.4em; color: #555; vertical-align: super; }
        .description { font-size: 1.1em; color: #333; margin-bottom: 30px; font-style: italic; }
        .status { color: #28a745; font-weight: bold; letter-spacing: 2px; }
        .wave { height: 50px; border-bottom: 3px solid #28a745; margin-top: 15px;
            /* Simple pulsating wave effect using background */
            background: radial-gradient(circle at 50% 100%, #28a745 10%, transparent 10%), 
                        radial-gradient(circle at 50% 100%, #28a745 20%, transparent 20%);
            background-size: 100px 50px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.6; transform: scaleX(0.98); } 100% { opacity: 1; transform: scaleX(1.02); } }
    </style>
</head>
<body>
    <div class="app-container">
        <p class="description">Targeted Benefit:</p>
        <div class="frequency-display">528<span class="unit">Hz</span></div>
        <div class="description">**Sleep deeply and wake restored**</div>
        <div class="wave"></div>
        <p class="status">OSCILLATOR ACTIVE</p>
    </div>
</body>
</html>
