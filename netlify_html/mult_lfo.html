<!DOCTYPE html>
<html>
<head>
    <title>Prime Meridian Drone - LFO Breathing</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; background-color: #05050a; color: #e0e0e0; 
        }
        .app-container { 
            background-color: #0d0d1a; border-radius: 24px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8); 
            padding: 40px; text-align: center; width: 480px; border: 1px solid #1a1a35;
        }
        .frequency-display { font-size: 3.5em; font-weight: 700; color: #00d4ff; margin-bottom: 5px; line-height: 1; text-shadow: 0 0 20px rgba(0,212,255,0.3); }
        .unit { font-size: 0.4em; color: #555; vertical-align: super; }
        .description { font-size: 0.9em; color: #777; margin-bottom: 25px; font-style: italic; letter-spacing: 1px; }
        
        #status-text { font-weight: bold; letter-spacing: 4px; margin-bottom: 30px; transition: color 0.3s; font-size: 0.75em; }
        .active { color: #00ffcc; text-shadow: 0 0 15px #00ffcc; }
        .inactive { color: #333; }

        .mixer-group { background: #111122; padding: 25px; border-radius: 20px; margin-bottom: 25px; border: 1px solid #1a1a35; }
        .mod-display { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .mod-box { background: #080815; padding: 10px; border-radius: 8px; width: 30%; border: 1px solid #1a1a35; }
        .mod-label { font-size: 0.7em; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .mod-val { font-size: 1.2em; font-weight: bold; color: #00d4ff; font-family: monospace; }

        .slider-group { margin-bottom: 20px; text-align: left; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 8px; color: #888; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00d4ff; height: 4px; }

        button {
            background-color: #080815; border: 1px solid #00d4ff; color: #00d4ff;
            padding: 16px 50px; border-radius: 50px; font-size: 1em; font-weight: bold;
            cursor: pointer; transition: all 0.4s; margin-top: 5px; text-transform: uppercase; letter-spacing: 3px;
        }
        button:hover { background-color: #00d4ff; color: #05050a; box-shadow: 0 0 30px #00d4ff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="frequency-display">528<span class="unit">Hz</span></div>
    <div class="description">Prime Meridian: 3-Phase LFO Modulation</div>
    <div id="status-text" class="inactive">MODULATION OFFLINE</div>

    <div class="mixer-group">
        <div class="mod-display">
            <div class="mod-box"><div class="mod-label">Fund</div><div id="disp-fund" class="mod-val">17%</div></div>
            <div class="mod-box"><div class="mod-label">Har 2</div><div id="disp-har2" class="mod-val">16%</div></div>
            <div class="mod-box"><div class="mod-label">Har 3</div><div id="disp-har3" class="mod-val">0%</div></div>
        </div>

        <div class="slider-group">
            <div class="slider-label"><span>LFO Breathing Speed</span><span id="speed-val">0.1 Hz</span></div>
            <input type="range" id="lfo-speed" min="0.01" max="1.0" step="0.01" value="0.1">
        </div>

        <div class="slider-group">
            <div class="slider-label"><span>Sub-Harmonics (Locked)</span><span>36%</span></div>
            <div style="height: 1px; background: #1a1a35; width: 100%;"></div>
        </div>
    </div>

    <button id="power-btn">Activate Meridian</button>
</div>

<script>
    let audioCtx = null;
    let oscillators = [];
    let gainNodes = [];
    let isRunning = false;

    const baseFreq = 528;
    // Ratios: Sub2(132), Sub1(264), Fund(528), Har2(1056), Har3(1584)
    const ratios = [0.25, 0.5, 1, 2, 3];
    
    // Modulation ranges (Min, Max)
    const ranges = [
        null, // Sub2
        null, // Sub1
        [0.17, 0.55], // Fund
        [0.16, 0.27], // Har2
        [0.00, 0.09]  // Har3
    ];

    const powerBtn = document.getElementById('power-btn');
    const statusText = document.getElementById('status-text');
    const speedSlider = document.getElementById('lfo-speed');
    const speedVal = document.getElementById('speed-val');

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        ratios.forEach((ratio, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = baseFreq * ratio;
            
            // Set initial gains
            if (i < 2) gain.gain.value = 0.36; // Subs locked at 36%
            else gain.gain.value = ranges[i][0];
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            oscillators.push(osc);
            gainNodes.push(gain);
            osc.start();
        });
        audioCtx.suspend();
    }

    function animateLFO() {
        if (!isRunning) return;
        const now = audioCtx.currentTime;
        const speed = parseFloat(speedSlider.value);
        
        // Phase offsets for 3-phase modulation (0, 120deg, 240deg)
        const phases = [0, (2 * Math.PI) / 3, (4 * Math.PI) / 3];

        // Modulate Fundamental, Har2, Har3 (indices 2, 3, 4)
        for (let i = 2; i <= 4; i++) {
            const [min, max] = ranges[i];
            const mid = (min + max) / 2;
            const amp = (max - min) / 2;
            const phase = phases[i - 2];
            
            // Calculate current gain value
            const val = mid + amp * Math.sin(2 * Math.PI * speed * now + phase);
            gainNodes[i].gain.setTargetAtTime(val, now, 0.05);
            
            // Update UI
            const labels = ['fund', 'har2', 'har3'];
            document.getElementById(`disp-${labels[i-2]}`).innerText = Math.round(val * 100) + "%";
        }
        requestAnimationFrame(animateLFO);
    }

    powerBtn.addEventListener('click', () => {
        if (!audioCtx) initAudio();
        if (!isRunning) {
            audioCtx.resume();
            statusText.innerText = "MERIDIAN ACTIVE (3-PHASE LFO)";
            statusText.className = "active";
            powerBtn.innerText = "Deactivate";
            isRunning = true;
            animateLFO();
        } else {
            audioCtx.suspend();
            statusText.innerText = "MODULATION OFFLINE";
            statusText.className = "inactive";
            powerBtn.innerText = "Activate Meridian";
            isRunning = false;
        }
    });

    speedSlider.addEventListener('input', (e) => {
        speedVal.innerText = e.target.value + " Hz";
    });
</script>

</body>
</html>
