
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Cosmic Scale Visualization</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* UI Overlay */
        #ui {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: none; /* Let clicks pass through to 3D except for slider */
        }
        
        #info-panel {
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; color: #4db8ff; }
        p { margin: 5px 0 0 0; font-size: 1rem; color: #ccc; }
        
        /* Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 60%;
            max-width: 600px;
            background: transparent;
            pointer-events: auto;
            cursor: pointer;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4db8ff;
            border-radius: 2px;
            box-shadow: 0 0 10px #4db8ff;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -10px;
            box-shadow: 0 0 15px white;
        }
        
        #scale-markers {
            width: 60%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #666;
            margin-top: 5px;
        }

        /* Loading Overlay */
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #4db8ff;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

    <div id="loader">Generating Universe...</div>

    <div id="ui">
        <div id="info-panel">
            <h1 id="obj-name">Scale Viewer</h1>
            <p id="obj-scale">1 meter</p>
        </div>
        <input type="range" id="scaleSlider" min="-16" max="22" step="0.01" value="0">
        <div id="scale-markers">
            <span>Femto</span>
            <span>Nano</span>
            <span>Micro</span>
            <span>Human</span>
            <span>Geo</span>
            <span>Solar</span>
            <span>Galactic</span>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002); // Distance fog

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; // Camera sits at z=5, looking at 0,0,0

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 2, 100);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Starfield Background (Static)
        const starGeo = new THREE.BufferGeometry();
        const starCount = 5000;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) {
            starPos[i] = (Math.random() - 0.5) * 600;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({color: 0x888888, size: 0.5, transparent: true, opacity: 0.8});
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);


        // --- 2. HELPERS FOR TEXTURE GENERATION ---
        function createTexture(color, noise=false) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0,0,256,256);
            if(noise) {
                for(let i=0; i<5000; i++) {
                    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.2})`;
                    ctx.beginPath();
                    ctx.arc(Math.random()*256, Math.random()*256, Math.random()*2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        }

        // --- 3. CREATE OBJECTS ---
        // We define 'scale' as log10 meters. 
        // 0 = 1m, 3 = 1km, -9 = 1nm, etc.
        const objects = [];

        function addObject(mesh, logSize, name, description, rotationSpeed = 0.01) {
            scene.add(mesh);
            mesh.visible = false; // Hidden by default
            objects.push({
                mesh: mesh,
                logSize: logSize,
                name: name,
                desc: description,
                rotSpeed: rotationSpeed
            });
        }

        // A. PROTON (Sub-atomic) ~ 10^-15
        const protonGeo = new THREE.SphereGeometry(1, 32, 32);
        const protonMat = new THREE.MeshPhongMaterial({ 
            color: 0xff0055, 
            emissive: 0x550022,
            shininess: 100 
        });
        const proton = new THREE.Mesh(protonGeo, protonMat);
        // Add flickering quarks glow
        const glowGeo = new THREE.SphereGeometry(1.5, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.3, wireframe: true});
        proton.add(new THREE.Mesh(glowGeo, glowMat));
        addObject(proton, -15, "Proton", "1 femtometer (10⁻¹⁵ m)");

        // B. ATOM (Hydrogen) ~ 10^-10
        const atomGroup = new THREE.Group();
        // Nucleus
        const nucGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const nucMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        atomGroup.add(new THREE.Mesh(nucGeo, nucMat));
        // Electron Shells
        const shellGeo = new THREE.RingGeometry(0.9, 1.0, 64);
        const shellMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
        const shell1 = new THREE.Mesh(shellGeo, shellMat);
        shell1.rotation.x = Math.PI / 2;
        const shell2 = new THREE.Mesh(shellGeo, shellMat);
        shell2.rotation.y = Math.PI / 2;
        atomGroup.add(shell1);
        atomGroup.add(shell2);
        addObject(atomGroup, -10, "Atom", "1 angstrom (10⁻¹⁰ m)");

        // C. DNA STRAND ~ 10^-9 (width) to 10^-7
        // Procedural Helix
        const dnaGroup = new THREE.Group();
        const tubeGeo = new THREE.CylinderGeometry(0.1, 0.1, 1, 8);
        const ballGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const dnaMat1 = new THREE.MeshLambertMaterial({color: 0xff0000});
        const dnaMat2 = new THREE.MeshLambertMaterial({color: 0x0000ff});
        
        for(let i = -10; i < 10; i++) {
            const angle = i * 0.5;
            const x = Math.cos(angle);
            const z = Math.sin(angle);
            const y = i * 0.3;

            const b1 = new THREE.Mesh(ballGeo, dnaMat1);
            b1.position.set(x, y, z);
            const b2 = new THREE.Mesh(ballGeo, dnaMat2);
            b2.position.set(-x, y, -z);
            
            // Rung
            const rung = new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({color: 0xcccccc}));
            rung.position.set(0, y, 0);
            rung.rotation.z = Math.PI/2;
            rung.rotation.y = angle;
            rung.scale.y = 2; // stretch cylinder to connect

            dnaGroup.add(b1); dnaGroup.add(b2); dnaGroup.add(rung);
        }
        addObject(dnaGroup, -8.5, "DNA Strand", "2 nanometers width (10⁻⁹ m)", 0.005);

        // D. BEACH BALL ~ 10^-0.3 (0.5m)
        const ballGeoReal = new THREE.SphereGeometry(1, 32, 32);
        // Create striped texture via canvas
        const ballCanvas = document.createElement('canvas');
        ballCanvas.width = 128; ballCanvas.height = 128;
        const bCtx = ballCanvas.getContext('2d');
        const colors = ['#ff0000', '#ffff00', '#0000ff', '#ffffff', '#00ff00', '#ffa500'];
        for(let i=0; i<6; i++) {
            bCtx.fillStyle = colors[i];
            bCtx.fillRect(i*(128/6), 0, (128/6)+1, 128);
        }
        const ballTex = new THREE.CanvasTexture(ballCanvas);
        const ballMat = new THREE.MeshStandardMaterial({ map: ballTex, roughness: 0.4 });
        const beachBall = new THREE.Mesh(ballGeoReal, ballMat);
        addObject(beachBall, -0.3, "Beach Ball", "0.5 meters (10⁰ m)");

        // E. EARTH ~ 10^7
        const earthGeo = new THREE.SphereGeometry(1, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({ 
            color: 0x2233ff, 
            emissive: 0x000022,
            specular: 0x111111,
            shininess: 10 
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        // Atmosphere glow
        const atmoGeo = new THREE.SphereGeometry(1.1, 64, 64);
        const atmoMat = new THREE.MeshBasicMaterial({ color: 0x4db8ff, transparent: true, opacity: 0.15, side: THREE.BackSide });
        earth.add(new THREE.Mesh(atmoGeo, atmoMat));
        addObject(earth, 7.1, "Earth", "12,742 km (10⁷ m)");

        // F. SUN ~ 10^9
        const sunGeo = new THREE.SphereGeometry(1, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        // Corona
        const coronaGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const coronaMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.2, wireframe: true });
        sun.add(new THREE.Mesh(coronaGeo, coronaMat));
        // Simple light emitter logic is handled by scene light, but visually:
        addObject(sun, 9.15, "The Sun", "1.4 million km (10⁹ m)");

        // G. GALAXY ~ 10^21
        const galaxyGroup = new THREE.Group();
        const particlesGeo = new THREE.BufferGeometry();
        const particleCount = 2000;
        const pPos = new Float32Array(particleCount * 3);
        const pColor = new Float32Array(particleCount * 3);
        
        for(let i=0; i<particleCount; i++) {
            // Spiral math
            const angle = i * 0.1;
            const radius = i * 0.005; // Tightness
            const armOffset = (i % 3) * (Math.PI * 2 / 3); // 3 arms
            
            const x = Math.cos(angle + armOffset) * radius * 5; // spread
            const z = Math.sin(angle + armOffset) * radius * 5;
            const y = (Math.random() - 0.5) * (1 - radius)*2; // bulges in center

            pPos[i*3] = x;
            pPos[i*3+1] = y;
            pPos[i*3+2] = z;

            pColor[i*3] = 0.5 + Math.random()*0.5; // R
            pColor[i*3+1] = 0.5 + Math.random()*0.5; // G
            pColor[i*3+2] = 1.0; // B
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        particlesGeo.setAttribute('color', new THREE.BufferAttribute(pColor, 3));
        const galMat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.8 });
        const galaxy = new THREE.Points(particlesGeo, galMat);
        galaxyGroup.add(galaxy);
        addObject(galaxyGroup, 20.9, "Milky Way Galaxy", "100,000 Light Years (10²¹ m)", 0.0005);


        // --- 4. ANIMATION & LOGIC ---
        const slider = document.getElementById('scaleSlider');
        const nameLabel = document.getElementById('obj-name');
        const descLabel = document.getElementById('obj-scale');

        function animate() {
            requestAnimationFrame(animate);

            const currentLogScale = parseFloat(slider.value);
            
            // Dynamic Background based on scale (Dark inside atom, starry in space)
            // Simply fading starfield out when very small
            starField.visible = currentLogScale > -5;

            let closestDist = 999;
            let closestObj = null;

            objects.forEach(obj => {
                // Determine scale difference
                const diff = obj.logSize - currentLogScale;

                // We want the object to be size 1 when slider == obj.logSize
                // If slider is smaller (further out), object looks small.
                // We fake the visual scale. 
                // Formula: Visual Size = 10 ^ (diff)
                // However, to prevent float errors and huge numbers, we cull.
                
                if (diff > -5 && diff < 5) {
                    obj.mesh.visible = true;
                    let scaleFactor = Math.pow(10, diff);
                    
                    // Smooth scaling
                    obj.mesh.scale.setScalar(scaleFactor);

                    // Rotation
                    obj.mesh.rotation.y += obj.rotSpeed;
                    if(obj.name === "Atom") { 
                        obj.mesh.children[1].rotation.x += 0.05; 
                        obj.mesh.children[2].rotation.y += 0.05;
                    }

                    // Opacity fade at edges of visibility
                    // If diff is nearing -2 (too small) or 2 (too big), fade out
                    // This is complex for standard materials, so we just let them shrink/grow.
                    // But we can check which is "active" for the UI.
                    
                    if(Math.abs(diff) < closestDist) {
                        closestDist = Math.abs(diff);
                        closestObj = obj;
                    }
                } else {
                    obj.mesh.visible = false;
                }
            });

            // Update UI with closest object info
            if(closestObj && closestDist < 2.5) {
                nameLabel.innerText = closestObj.name;
                descLabel.innerText = closestObj.desc;
                nameLabel.style.opacity = 1 - (closestDist/2.5);
                descLabel.style.opacity = 1 - (closestDist/2.5);
            } else {
                nameLabel.innerText = "Empty Space";
                descLabel.innerText = `10^${currentLogScale.toFixed(1)} meters`;
                nameLabel.style.opacity = 0.5;
            }

            renderer.render(scene, camera);
        }

        // Hide loader
        document.getElementById('loader').style.opacity = 0;

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Set default slider to Human Scale (-0.3)
        slider.value = -0.3;

        animate();

    </script>
</body>
</html>
