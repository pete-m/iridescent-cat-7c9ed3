<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkScope Nexus | JMail Stable v4.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js" crossorigin="anonymous"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #05070a; overflow: hidden; display: flex; flex-direction: column; }
        #ticker-wrap { background: #962d22; height: 45px; border-bottom: 3px solid #641e16; overflow: hidden; display: flex; align-items: center; flex-shrink: 0; }
        .ticker { white-space: nowrap; padding-left: 100%; animation: marquee 35s linear infinite; color: white; font-family: monospace; font-weight: bold; }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-200%); } }
        #network-map { flex-grow: 1; background: #ffffff; width: 100%; }
        #nexus-menu { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .nexus-btn { background: #1c5982; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; border: 1px solid #34495e; }
        .nexus-content { display: none; position: absolute; bottom: 55px; left: 0; background: #0d1117; width: 230px; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        .nexus-content a, .nexus-content button { color: #58a6ff; padding: 12px; text-decoration: none; display: block; border: none; font-size: 13px; background: none; width: 100%; text-align: left; cursor: pointer; border-bottom: 1px solid #21262d; }
        .nexus-content button:hover { background: #161b22; }
        .show { display: block; }
        .dev-header { background: #1c5982; color: white; padding: 8px; font-size: 10px; font-family: monospace; }
        .dev-tag { color: #3498db; display: block; padding: 4px 12px; font-size: 11px; font-weight: bold; }
        /* Terminal Styling */
        #debug-terminal { display:none; position:fixed; top:45px; left:0; width:100%; height:30%; background:rgba(0,0,0,0.9); color:#00ff00; font-family:monospace; font-size:11px; overflow-y:auto; z-index:10000; padding:10px; border-bottom:2px solid #e67e22; }
    </style>
</head>
<body>
    <div id="ticker-wrap"><div class="ticker">[MAR 9] JMAIL RESTORATION ACTIVE --- LUTNICK/BONDI NODES VERIFIED --- TRADE ENVOY FILES LIVE ---</div></div>
    
    <div id="network-map"></div>

    <div id="debug-terminal"><div>[NEXUS DEBUG LOG ACTIVE]</div></div>
 
    <div id="nexus-menu">
        <div style="margin-bottom: 10px; display: flex; gap: 8px;">
            <button onclick="loadProgram('network')" class="nexus-btn" style="background: #2c3e50;">🕸️ JMail</button>
            <button onclick="loadProgram('andrew')" class="nexus-btn" style="background: #2c3e50;">🧭 Andrew</button>
        </div>

        <button onclick="document.getElementById('dev_Dropdown').classList.toggle('show')" class="nexus-btn">dev</button>
      
        <div id="dev_Dropdown" class="nexus-content">
            <div class="dev-header">panel
            <span class="dev-tag">System Tools</span>
            
            <a href="./netlify_html/dev/univ_scale.html">📊 Universal Scaler</a>
            <a href="./netlify_html/dev/audio_analysis.html">🎙️ Audio Analysis</a>

            <hr style="border:0; border-top:1px solid #333; margin:0;">
            
            <button onclick="toggleDebug()" style="color:#e67e22;">📟 Toggle Console</button>
            <button onclick="toggleMainEvent()" style="color:#f1c40f;">👁️ Toggle Display</button>
            <button onclick="document.getElementById('dev_Dropdown').classList.remove('show')" style="color:#e74c3c;">Close</button>
        </div>
    </div>

    <script type="module">
        import { initAndrew } from './netlify_html/active/andrew_trade.js';
        import { initNetwork } from './netlify_html/active/network.js';

        // Bind to window for HTML button access
        window.loadProgram = function(prog) {
            const stage = 'network-map';
            document.getElementById(stage).style.display = 'block';
            
            if (prog === 'andrew') initAndrew(stage);
            if (prog === 'network') initNetwork(stage);
            
            const drop = document.getElementById('dev_Dropdown');
            if (drop) drop.classList.remove('show');
        };

        window.toggleDebug = function() {
            const term = document.getElementById('debug-terminal');
            term.style.display = (term.style.display === 'none' || term.style.display === '') ? 'block' : 'none';
        };

        window.toggleMainEvent = function() {
            const el = document.getElementById('network-map');
            el.style.display = (el.style.display === 'none') ? 'block' : 'none';
        };

        // Console Forwarding to Terminal
        const term = document.getElementById('debug-terminal');
        const originalLog = console.log;
        console.log = function(msg) {
            if(term) {
                const line = document.createElement('div');
                line.textContent = `> ${msg}`;
                term.appendChild(line);
                term.scrollTop = term.scrollHeight;
            }
            originalLog.apply(console, arguments);
        };

        // Default Load: JMail Master Network
        window.addEventListener('load', () => {
            console.log("Nexus v4.8: Syncing JMail Data...");
            window.loadProgram('network'); 
        });
    </script>
</body>
</html>
