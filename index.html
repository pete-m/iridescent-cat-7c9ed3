<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkScope Nexus | Stable v3.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js" crossorigin="anonymous"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #05070a; overflow: hidden; display: flex; flex-direction: column; }
        #ticker-wrap { background: #962d22; height: 45px; border-bottom: 3px solid #641e16; overflow: hidden; display: flex; align-items: center; flex-shrink: 0; }
        .ticker { white-space: nowrap; padding-left: 100%; animation: marquee 35s linear infinite; color: white; font-family: monospace; font-weight: bold; }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-200%); } }
        #network-map { flex-grow: 1; background: #ffffff; width: 100%; }
        #nexus-menu { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .nexus-btn { background: #1c5982; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .nexus-content { display: none; position: absolute; bottom: 55px; left: 0; background: #0d1117; width: 230px; border: 1px solid #30363d; border-radius: 8px; }
        .nexus-content a { color: #58a6ff; padding: 14px; text-decoration: none; display: block; border-bottom: 1px solid #21262d; font-size: 13px; }
        .show { display: block; }
    </style>
</head>
<body>
    <div id="ticker-wrap"><div class="ticker">[MAR 9] LUTNICK INTERVIEW --- BONDI SUBPOENAED --- TRADE ENVOY FILES LIVE ---</div></div>
    <div id="network-map"></div>
    <div id="nexus-menu">
      
      <div id="dev_Dropdown" class="nexus-content">
    <div style="background:#1c5982; padding:8px; font-size:10px;">CONTROL PANEL</div>
    
         <span>color=blue
         Development</span> 
            <a href="./netlify_html/univ_scale.html">📊 Universal Scaler</a>
            <a href="./netlify_html/audio_analysis.html">🎙️ Audio Analysis</a>
            <a href="./netlify_html/andrew_trade.html">🧭 Trade Envoy Data</a>
        </div>
        <button onclick="document.getElementById('dev_Dropdown').classList.toggle('show')" class="nexus-btn">dev</button>

    <button onclick="loadProgram('network')">🕸️ Master Network</button>
    <button onclick="loadProgram('andrew')">🧭 Trade Envoy (Andrew)</button>
    
    <hr style="border:0; border-top:1px solid #333;">
    
    <button onclick="toggleMainEvent()" style="color:#f1c40f;">👁️ Toggle Main Event</button>
    <button onclick="document.getElementById('myDropdown').classList.remove('show')" style="color:#e74c3c;">Close</button>
</div>    </div>
      
      
      
    <script>
        window.onload = function() {
            if (typeof vis === 'undefined') {
                alert("CRITICAL: Network Engine Blocked by Browser.");
                return;
            }
            var container = document.getElementById('network-map');
            var nodes = new vis.DataSet([{id: 1, label: 'Epstein', shape: 'diamond'}, {id: 2, label: 'Lutnick'}]);
            var edges = new vis.DataSet([{from: 1, to: 2}]);
            new vis.Network(container, {nodes, edges}, {physics: {stabilization: true}});
        };
    </script>
</body>
</html>
