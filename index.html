<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkScope Nexus | UnStable v4.9.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js" crossorigin="anonymous" defer></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #05070a; overflow: hidden; display: flex; flex-direction: column; }
        #ticker-wrap { background: #962d22; height: 45px; border-bottom: 3px solid #641e16; overflow: hidden; display: flex; align-items: center; flex-shrink: 0; }
        /* Optimized animation performance using will-change */
        .ticker { 
            white-space: nowrap; 
            padding-left: 100%; 
            animation: marquee 35s linear infinite; 
            color: white; 
            font-family: monospace; 
            font-weight: bold;
            will-change: transform; 
        }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-200%); } }
        #network-map { flex-grow: 1; background: #ffffff; width: 100%; }
        #nexus-menu { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .nexus-btn { background: #1c5982; color: white; border: 1px solid #34495e; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .nexus-content { display: none; position: absolute; bottom: 55px; left: 0; background: #0d1117; width: 230px; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        .nexus-content a, .nexus-content button { color: #58a6ff; padding: 12px; text-decoration: none; display: block; border-bottom: 1px solid #21262d; font-size: 13px; background: none; width: 100%; text-align: left; cursor: pointer; border-left:none; border-right:none; border-top:none; }
        .show { display: block; }
        .dev-header { background: #1c5982; color: white; padding: 8px; font-size: 10px; font-family: monospace; }
        #debug-terminal { display:none; position:fixed; top:45px; left:0; width:100%; height:30%; background:rgba(0,0,0,0.95); color:#00ff00; font-family:monospace; font-size:11px; overflow-y:auto; z-index:10000; padding:10px; border-bottom:2px solid #e67e22; }
    </style>
</head>
<body>

<<div id="debug-terminal" style="background:#000; color:#00ff00; font-family:monospace; font-size:11px; padding:15px; height:180px; overflow-y:auto; border-bottom:3px solid #e67e22; z-index:10001; position:relative;">
    <div>[NEXUS v5.1 SYSTEM BOOT]</div>
</div>

<div id="ticker-wrap"><div class="ticker">[MAR 9] JMAIL RESTORATION ACTIVE --- CACHE BUSTER ENABLED ---</div></div>

<div id="network-map" style="flex-grow:1; background:#fff;"></div>

<div id="nexus-menu">
    <div style="margin-bottom: 10px; display: flex; gap: 8px;">
        <button onclick="window.loadProgram('network')" class="nexus-btn" style="background: #2c3e50;">🕸️ Master</button>
        <button onclick="window.loadProgram('andrew')" class="nexus-btn" style="background: #2c3e50;">🧭 Andrew</button>
    </div>
    <button onclick="document.getElementById('dev_Dropdown').classList.toggle('show')" class="nexus-btn">dev</button>
    <div id="dev_Dropdown" class="nexus-content">
        <a href="netlify_html/dev/univ_scale.html">📊 Universal Scaler</a>
        <button onclick="window.toggleMainEvent()" style="color:#f1c40f;">👁️ Toggle Display</button>
    </div>
</div>

<script type="module">
    const term = document.getElementById('debug-terminal');

    window.console.log = function(msg) {
        if (typeof msg === 'string' && msg.includes('ResizeObserver')) return;
        const line = document.createElement('div');
        line.innerHTML = `> ${msg}`;
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
    };

    window.toggleMainEvent = function() {
        const el = document.getElementById('network-map');
        if(el) el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    };

    // THE CACHE-BUSTER LOADER
    window.loadProgram = async function(prog) {
        // Generates a unique string like ?t=1709999999
        const buster = "?t=" + new Date().getTime();
        const fileName = (prog === 'network') ? 'network.js' : 'andrew_trade.js';
        const fullUrl = `./netlify_html/active/${fileName}${buster}`;
        
        console.log("Fetching fresh: " + fileName);
        
        try {
            const module = await import(fullUrl);
            if (prog === 'network') module.initNetwork('network-map');
            if (prog === 'andrew') module.initAndrew('network-map');
            console.log("<span style='color:cyan'>SUCCESS: " + prog + " is live.</span>");
        } catch (err) {
            console.log("<span style='color:#ff4444;'>FETCH FAILED:</span> " + err.message);
            // This will show exactly where the browser is looking
            console.log("Path attempted: " + fullUrl);
        }
    };

    window.addEventListener('load', () => {
        console.log("Syncing with GitHub Pages...");
        window.loadProgram('network'); 
    });
</script>

</body>
</html>
