<!DOCTYPE html>
<html>
<head>
    <title>Functional 528Hz Oscillator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f4f8; }
        .app-container { 
            background-color: #ffffff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); 
            padding: 40px; text-align: center; width: 350px; 
        }
        
        /* Display */
        .frequency-display { font-size: 4.5em; font-weight: 700; color: #28a745; margin-bottom: 5px; line-height: 1; }
        .unit { font-size: 0.4em; color: #555; vertical-align: super; }
        .description { font-size: 1.1em; color: #333; margin-bottom: 25px; font-style: italic; }
        
        /* Status & Wave */
        #status-text { font-weight: bold; letter-spacing: 2px; margin-top: 5px; margin-bottom: 30px; 
            transition: color 0.3s;
        }
        .active { color: #28a745; }
        .inactive { color: #dc3545; }
        
        .wave { height: 50px; border-bottom: 3px solid transparent; margin-top: 15px; 
            transition: border-color 0.3s;
        }
        .active-wave { border-color: #28a745; 
            background: radial-gradient(circle at 50% 100%, #28a745 10%, transparent 10%), 
                        radial-gradient(circle at 50% 100%, #28a745 20%, transparent 20%);
            background-size: 100px 50px; animation: pulse 1s infinite alternate; 
        }
        @keyframes pulse { 0% { opacity: 0.6; transform: scaleX(0.98); } 100% { opacity: 1; transform: scaleX(1.02); } }

        /* Controls */
        .controls { display: flex; justify-content: space-around; align-items: center; width: 100%; margin-top: 20px; }
        
        .volume-control { display: flex; align-items: center; flex-grow: 1; margin-right: 20px; }
        .volume-icon { font-size: 1.5em; color: #6c757d; margin-right: 10px; }
        .volume-slider { 
            -webkit-appearance: none; appearance: none; width: 100%; height: 8px; background: #ddd; 
            border-radius: 4px; outline: none; margin: 0;
        }
        .volume-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; appearance: none; width: 18px; height: 18px; 
            background: #007bff; border-radius: 50%; cursor: pointer; 
        }
        
        .power-button { 
            color: white; border: none; padding: 10px 20px; border-radius: 25px; 
            cursor: pointer; font-weight: bold; font-size: 0.9em; transition: background-color 0.3s;
        }
        .power-on { background-color: #dc3545; }
        .power-off { background-color: #28a745; }
    </style>
</head>
<body>
    <div class="app-container">
        <p class="description">Targeted Benefit:</p>
        <div class="frequency-display">528<span class="unit">Hz</span></div>
        <div class="description">**Sleep deeply and wake restored**</div>
        
        <div id="wave-container" class="wave"></div>
        <p id="status-text" class="inactive">OSCILLATOR INACTIVE</p>

        <div class="controls">
            <div class="volume-control">
                <span class="volume-icon">🔊</span>
                <input type="range" min="0" max="100" value="50" class="volume-slider" id="volume-slider">
            </div>
            <button id="power-button" class="power-off">START</button>
        </div>
    </div>

    <script>
        // --- Web Audio API Setup ---
        const FREQUENCY = 528;
        let audioContext;
        let oscillator = null;
        let gainNode = null;
        let isRunning = false;

        // --- DOM Elements ---
        const powerButton = document.getElementById('power-button');
        const volumeSlider = document.getElementById('volume-slider');
        const statusText = document.getElementById('status-text');
        const waveContainer = document.getElementById('wave-container');

        // --- Core Functions ---

        function updateStatus(active) {
            isRunning = active;
            if (active) {
                powerButton.textContent = 'STOP';
                powerButton.className = 'power-button power-on';
                statusText.textContent = 'OSCILLATOR ACTIVE';
                statusText.className = 'active';
                waveContainer.classList.add('active-wave');
            } else {
                powerButton.textContent = 'START';
                powerButton.className = 'power-button power-off';
                statusText.textContent = 'OSCILLATOR INACTIVE';
                statusText.className = 'inactive';
                waveContainer.classList.remove('active-wave');
            }
        }

        function startOscillator() {
            if (isRunning) return;

            // 1. Initialize Audio Context if needed
            audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
            
            // 2. Create nodes
            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();

            // 3. Configure oscillator (528Hz Sine Wave)
            oscillator.type = 'sine'; // Pure tone
            oscillator.frequency.setValueAtTime(FREQUENCY, audioContext.currentTime);

            // 4. Set initial volume based on slider
            const volumeValue = volumeSlider.value / 100;
            gainNode.gain.setValueAtTime(volumeValue, audioContext.currentTime);

            // 5. Connect the nodes: Oscillator -> Gain -> Speaker
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // 6. Start the oscillator
            oscillator.start();
            updateStatus(true);
        }

        function stopOscillator() {
            if (!isRunning) return;

            // Stop the oscillator and disconnect
            // Use a short ramp to avoid clicks/pops
            gainNode.gain.setValueAtTime(gainNode.gain.value, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.0001, audioContext.currentTime + 0.05);

            // Wait a moment then stop the source and null the objects
            oscillator.stop(audioContext.currentTime + 0.05);
            oscillator = null;
            gainNode = null;

            updateStatus(false);
        }

        function handlePowerToggle() {
            if (!isRunning) {
                startOscillator();
            } else {
                stopOscillator();
            }
        }

        function handleVolumeChange() {
            if (gainNode) {
                // Map slider value (0-100) to gain (0-1.0)
                const newGain = volumeSlider.value / 100;
                gainNode.gain.setValueAtTime(newGain, audioContext.currentTime);
            }
        }

        // --- Event Listeners ---
        powerButton.addEventListener('click', handlePowerToggle);
        volumeSlider.addEventListener('input', handleVolumeChange);

        // Set initial volume visually
        handleVolumeChange();

    </script>
</body>
</html>
